apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: tag-release-commit-pipeline
  annotations:
    description: |
      Pipeline to tag the release commit with the version from the release.
      Extracts version from release name and creates/pushes a git tag.
spec:
  description: |
    This pipeline tags the source commit referenced in a release with the appropriate version tag.
    It extracts the commit SHA from the release metadata and the version from the release name.
  params:
    - name: snapshot
      description: Snapshot reference (namespace/name format)
      type: string
    - name: release
      description: Release reference (namespace/name format)
      type: string
    - name: git-url
      description: Git repository URL
      type: string
      default: "https://github.com/openshift/multiarch-tuning-operator.git"
    - name: git-branch
      description: Git branch that was built
      type: string
      default: "v1.x"

  results:
    - name: TAG_NAME
      description: The git tag that was created
      value: $(tasks.tag-release-commit.results.TAG_NAME)
    - name: COMMIT_SHA
      description: The commit that was tagged
      value: $(tasks.extract-release-commit.results.COMMIT_SHA)

  tasks:
    - name: extract-release-commit
      taskSpec:
        params:
          - name: release
        results:
          - name: COMMIT_SHA
            description: The commit SHA from the release
          - name: RELEASE_NAME
            description: The release name
          - name: GIT_BRANCH
            description: The git branch from the release
        steps:
          - name: parse-commit
            image: quay.io/konflux-ci/appstudio-utils:latest
            script: |
              #!/bin/bash
              set -euo pipefail

              # Install jq
              mkdir -p /tmp/tools
              export PATH="/tmp/tools:$PATH"
              echo "Installing jq (latest)..."
              JQ_VERSION=$(curl -s https://api.github.com/repos/jqlang/jq/releases/latest | grep -oP '"tag_name": "\K[^"]+')
              echo "Latest jq version: $JQ_VERSION"
              curl -L "https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/jq-linux-amd64" -o /tmp/tools/jq
              chmod +x /tmp/tools/jq

              RELEASE_REF='$(params.release)'
              echo "Release reference: $RELEASE_REF"

              # Parse namespace/name from reference (same as snapshot handling)
              if [[ "$RELEASE_REF" == *"/"* ]]; then
                RELEASE_NAMESPACE="${RELEASE_REF%/*}"
                RELEASE_NAME="${RELEASE_REF#*/}"
              else
                RELEASE_NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
                RELEASE_NAME="$RELEASE_REF"
              fi

              echo "Fetching release $RELEASE_NAME from namespace $RELEASE_NAMESPACE..."

              # Fetch the release using oc
              RELEASE=$(oc get release "$RELEASE_NAME" -n "$RELEASE_NAMESPACE" -o json)

              # Parse release JSON
              COMMIT_SHA=$(echo "$RELEASE" | jq -r '.metadata.labels."pac.test.appstudio.openshift.io/sha"')
              GIT_BRANCH=$(echo "$RELEASE" | jq -r '.metadata.annotations."pac.test.appstudio.openshift.io/source-branch" // empty' | sed 's|^refs/heads/||')

              # Default to git-branch parameter if not found in release
              if [ -z "$GIT_BRANCH" ] || [ "$GIT_BRANCH" = "null" ]; then
                GIT_BRANCH="v1.x"
              fi

              echo "Release: $RELEASE_NAME"
              echo "Commit SHA: $COMMIT_SHA"
              echo "Git branch: $GIT_BRANCH"

              echo -n "$COMMIT_SHA" > $(results.COMMIT_SHA.path)
              echo -n "$RELEASE_NAME" > $(results.RELEASE_NAME.path)
              echo -n "$GIT_BRANCH" > $(results.GIT_BRANCH.path)
      params:
        - name: release
          value: $(params.release)

    - name: extract-version
      runAfter:
        - extract-release-commit
      taskSpec:
        params:
          - name: snapshot
        results:
          - name: VERSION
            description: Version extracted from bundle CSV
        steps:
          - name: parse-version
            image: quay.io/konflux-ci/appstudio-utils:latest
            script: |
              #!/bin/bash
              set -euo pipefail

              # Install tools
              mkdir -p /tmp/tools
              export PATH="/tmp/tools:$PATH"

              if ! command -v jq &> /dev/null; then
                JQ_VERSION=$(curl -s https://api.github.com/repos/jqlang/jq/releases/latest | grep -oP '"tag_name": "\K[^"]+')
                curl -sL "https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/jq-linux-amd64" -o /tmp/tools/jq
                chmod +x /tmp/tools/jq
              fi

              curl -sL "https://github.com/lework/skopeo-binary/releases/download/v1.17.0/skopeo-linux-amd64" -o /tmp/tools/skopeo
              chmod +x /tmp/tools/skopeo

              YQ_VERSION=$(curl -s https://api.github.com/repos/mikefarah/yq/releases/latest | grep -oP '"tag_name": "\K[^"]+')
              curl -sL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /tmp/tools/yq
              chmod +x /tmp/tools/yq

              # Fetch snapshot
              SNAPSHOT_REF='$(params.snapshot)'
              if [[ "$SNAPSHOT_REF" == *"/"* ]]; then
                SNAPSHOT_NAMESPACE="${SNAPSHOT_REF%/*}"
                SNAPSHOT_NAME="${SNAPSHOT_REF#*/}"
              else
                SNAPSHOT_NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
                SNAPSHOT_NAME="$SNAPSHOT_REF"
              fi

              echo "Fetching snapshot $SNAPSHOT_NAME from namespace $SNAPSHOT_NAMESPACE..."
              SNAPSHOT=$(oc get snapshot "$SNAPSHOT_NAME" -n "$SNAPSHOT_NAMESPACE" -o json)

              # Extract bundle image from snapshot
              BUNDLE_IMAGE=$(echo "$SNAPSHOT" | jq -r '.spec.components[] | select(.name | contains("bundle")) | .containerImage' | head -n1)
              if [ -z "$BUNDLE_IMAGE" ] || [ "$BUNDLE_IMAGE" = "null" ]; then
                echo "❌ ERROR: No bundle image found in snapshot"
                exit 1
              fi
              echo "Bundle image: $BUNDLE_IMAGE"

              # Copy and extract bundle to get CSV
              BUNDLE_DIR="/tmp/bundle"
              LAYERS_DIR="/tmp/bundle-extracted"
              mkdir -p "$BUNDLE_DIR" "$LAYERS_DIR"

              skopeo copy "docker://$BUNDLE_IMAGE" "dir:$BUNDLE_DIR"

              MANIFEST_FILE=$(find "$BUNDLE_DIR" -name "manifest.json" | head -1)
              if [ -z "$MANIFEST_FILE" ]; then
                echo "❌ ERROR: Could not find manifest.json in bundle image"
                exit 1
              fi

              for layer in $(jq -r '.layers[].digest' "$MANIFEST_FILE" | cut -d: -f2); do
                if [ -f "$BUNDLE_DIR/$layer" ]; then
                  tar -xzf "$BUNDLE_DIR/$layer" -C "$LAYERS_DIR" 2>/dev/null || \
                  tar -xf "$BUNDLE_DIR/$layer" -C "$LAYERS_DIR" 2>/dev/null || true
                fi
              done

              CSV_FILE=$(find "$LAYERS_DIR" -name "*clusterserviceversion.yaml" | head -1)
              if [ -z "$CSV_FILE" ]; then
                echo "❌ ERROR: Could not find CSV file in bundle"
                exit 1
              fi

              # Extract version from CSV
              VERSION=$(yq eval '.spec.version' "$CSV_FILE")
              if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
                echo "❌ ERROR: Could not extract version from CSV"
                exit 1
              fi

              [[ "$VERSION" =~ ^v ]] || VERSION="v${VERSION}"

              echo "Extracted version from bundle CSV: $VERSION"
              echo -n "$VERSION" > $(results.VERSION.path)
      params:
        - name: snapshot
          value: $(params.snapshot)

    - name: tag-release-commit
      runAfter:
        - extract-version
      taskSpec:
        params:
          - name: git-url
          - name: git-branch
          - name: commit-sha
          - name: version
        results:
          - name: TAG_NAME
            description: The tag that was created/pushed
        steps:
          - name: create-and-push-tag
            image: quay.io/konflux-ci/appstudio-utils:latest
            env:
              - name: APP_ID
                valueFrom:
                  secretKeyRef:
                    name: github-app-credentials
                    key: app-id
                    optional: true
              - name: INSTALLATION_ID
                valueFrom:
                  secretKeyRef:
                    name: github-app-credentials
                    key: installation-id
                    optional: true
              - name: PRIVATE_KEY
                valueFrom:
                  secretKeyRef:
                    name: github-app-credentials
                    key: private-key
                    optional: true
            script: |
              #!/bin/bash
              set -euo pipefail

              GIT_URL="$(params.git-url)"
              GIT_BRANCH="$(params.git-branch)"
              COMMIT_SHA="$(params.commit-sha)"
              VERSION="$(params.version)"

              echo "=========================================="
              echo "Tagging Release Commit"
              echo "=========================================="
              echo "Repository: $GIT_URL"
              echo "Branch: $GIT_BRANCH"
              echo "Commit: $COMMIT_SHA"
              echo "Version: $VERSION"
              echo ""

              # Generate GitHub App installation token if credentials are available
              if [ -n "${APP_ID:-}" ] && [ -n "${INSTALLATION_ID:-}" ] && [ -n "${PRIVATE_KEY:-}" ]; then
                echo "Generating GitHub App installation token..."

                # Install required tools
                mkdir -p /tmp/tools
                export PATH="/tmp/tools:$PATH"

                # Install jq if not already available
                if ! command -v jq &> /dev/null; then
                  echo "Installing jq..."
                  JQ_VERSION=$(curl -s https://api.github.com/repos/jqlang/jq/releases/latest | grep -oP '"tag_name": "\K[^"]+')
                  curl -L "https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/jq-linux-amd64" -o /tmp/tools/jq
                  chmod +x /tmp/tools/jq
                fi

                # Generate JWT
                # Header
                HEADER='{"alg":"RS256","typ":"JWT"}'
                HEADER_B64=$(echo -n "$HEADER" | base64 -w0 | tr '+/' '-_' | tr -d '=')

                # Payload (expires in 10 minutes)
                NOW=$(date +%s)
                EXPIRES=$((NOW + 600))
                PAYLOAD="{\"iat\":$NOW,\"exp\":$EXPIRES,\"iss\":\"$APP_ID\"}"
                PAYLOAD_B64=$(echo -n "$PAYLOAD" | base64 -w0 | tr '+/' '-_' | tr -d '=')

                # Signature
                SIGNATURE_INPUT="${HEADER_B64}.${PAYLOAD_B64}"
                echo -n "$PRIVATE_KEY" > /tmp/private-key.pem
                SIGNATURE=$(echo -n "$SIGNATURE_INPUT" | openssl dgst -sha256 -sign /tmp/private-key.pem | base64 -w0 | tr '+/' '-_' | tr -d '=')
                rm -f /tmp/private-key.pem

                JWT="${SIGNATURE_INPUT}.${SIGNATURE}"

                # Exchange JWT for installation access token
                echo "Exchanging JWT for installation token..."
                RESPONSE=$(curl -s -X POST \
                  -H "Authorization: Bearer $JWT" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/app/installations/$INSTALLATION_ID/access_tokens")

                GITHUB_TOKEN=$(echo "$RESPONSE" | jq -r '.token')

                if [ "$GITHUB_TOKEN" = "null" ] || [ -z "$GITHUB_TOKEN" ]; then
                  echo "❌ ERROR: Failed to generate installation token"
                  echo "Response: $RESPONSE"
                  exit 1
                fi

                echo "✅ Generated installation token successfully"
                # Export for gh CLI (which uses GH_TOKEN instead of GITHUB_TOKEN)
                export GH_TOKEN="$GITHUB_TOKEN"
              else
                echo "⚠️  GitHub App credentials not found, skipping token generation"
                GITHUB_TOKEN=""
              fi

              # Derive authenticated URL from GIT_URL parameter
              AUTH_GIT_URL="$GIT_URL"
              [[ "$AUTH_GIT_URL" == *.git ]] || AUTH_GIT_URL="${AUTH_GIT_URL}.git"

              # Check if tag already exists on the remote before cloning
              echo "Checking if tag $VERSION already exists on remote..."
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                REMOTE_CHECK_URL="https://oauth2:${GITHUB_TOKEN}@${AUTH_GIT_URL#https://}"
              else
                REMOTE_CHECK_URL="$GIT_URL"
              fi

              # Fetch both the tag ref and its peeled commit (^{})
              TAG_REFS=$(git ls-remote --tags "$REMOTE_CHECK_URL" "refs/tags/$VERSION" "refs/tags/$VERSION^{}" 2>/dev/null)
              EXISTING_TAG_SHA=$(echo "$TAG_REFS" | awk -v tag="refs/tags/$VERSION" '$2 == tag {print $1}')

              if [ -n "$EXISTING_TAG_SHA" ]; then
                # Resolve peeled commit (for annotated tags); fall back to tag SHA for lightweight tags
                PEELED_SHA=$(echo "$TAG_REFS" | awk -v tag="refs/tags/$VERSION^{}" '$2 == tag {print $1}')
                TAG_COMMIT="${PEELED_SHA:-$EXISTING_TAG_SHA}"

                if [ "$TAG_COMMIT" = "$COMMIT_SHA" ]; then
                  echo "✅ Tag $VERSION already exists on remote pointing to correct commit ($COMMIT_SHA)"
                  echo -n "$VERSION" > $(results.TAG_NAME.path)
                  exit 0
                else
                  echo "⚠️  Tag $VERSION exists on remote but points to $TAG_COMMIT, not $COMMIT_SHA"
                  echo "Proceeding to clone and verify..."
                fi
              else
                echo "Tag $VERSION does not exist on remote — will create it."
              fi

              # Clone the repository
              REPO_DIR="/tmp/repo"
              echo "Cloning repository (branch: $GIT_BRANCH)..."

              if [ -n "${GITHUB_TOKEN:-}" ]; then
                echo "Using authenticated clone..."
                git clone --branch "$GIT_BRANCH" --single-branch \
                  "https://oauth2:${GITHUB_TOKEN}@${AUTH_GIT_URL#https://}" \
                  "$REPO_DIR"
              else
                echo "⚠️  Warning: GITHUB_TOKEN not set, cloning without authentication..."
                git clone --branch "$GIT_BRANCH" --single-branch \
                  "$GIT_URL" \
                  "$REPO_DIR"
              fi

              cd "$REPO_DIR"

              # Configure git
              git config user.name "Konflux Release Bot"
              git config user.email "konflux-release@redhat.com"

              # Configure authentication for push if token available
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                git remote set-url origin "https://oauth2:${GITHUB_TOKEN}@${AUTH_GIT_URL#https://}"
              fi

              # Check if tag already exists
              if git rev-parse "$VERSION" >/dev/null 2>&1; then
                EXISTING_COMMIT=$(git rev-parse "$VERSION^{commit}")
                if [ "$EXISTING_COMMIT" = "$COMMIT_SHA" ]; then
                  echo "✅ Tag $VERSION already exists on correct commit"
                  echo -n "$VERSION" > $(results.TAG_NAME.path)

                  # Still try to push in case tag exists locally but not on remote
                  if [ -n "${GITHUB_TOKEN:-}" ]; then
                    echo "Ensuring tag is pushed to remote..."
                    git push origin "$VERSION" 2>&1 || echo "Tag may already exist on remote"
                  fi
                  exit 0
                else
                  echo "⚠️  Warning: Tag $VERSION already exists but on different commit:"
                  echo "   Existing: $EXISTING_COMMIT"
                  echo "   Expected: $COMMIT_SHA"
                  echo "   Skipping tag creation to avoid conflicts"
                  echo -n "$VERSION" > $(results.TAG_NAME.path)
                  exit 0
                fi
              fi

              # Create the tag
              echo "Creating tag $VERSION on commit $COMMIT_SHA..."
              git tag -a "$VERSION" "$COMMIT_SHA" -m "Release $VERSION

              Automated tag created by Konflux release pipeline.

              Release commit: $COMMIT_SHA
              Source branch: $GIT_BRANCH"

              echo "✅ Tag created successfully"

              # Push the tag
              if [ -n "${GITHUB_TOKEN:-}" ]; then
                echo "Pushing tag to remote..."
                git push origin "$VERSION"
                echo "✅ Tag pushed successfully"
                echo -n "$VERSION" > $(results.TAG_NAME.path)
              else
                echo "❌ ERROR: GITHUB_TOKEN not set"
                echo "Cannot push tag without GitHub authentication"
                echo ""
                echo "To fix this, create the github-token secret:"
                echo "  oc create secret generic github-token \\"
                echo "    --from-literal=token=<your-github-token> \\"
                echo "    -n <your-namespace>"
                exit 1
              fi
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-branch
          value: $(tasks.extract-release-commit.results.GIT_BRANCH)
        - name: commit-sha
          value: $(tasks.extract-release-commit.results.COMMIT_SHA)
        - name: version
          value: $(tasks.extract-version.results.VERSION)